<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Test de Formulário</h1>
    <form action="Cadastro.php" method="get" autocomplete="on">
    <p>
        <label for="inome">Nome:</label>
       
        <input type="text" name="nome" id="inome" required maxlength="30" placeholder="Nome Completo" autocomplete="name">
    <p>
        <label for="imedia">Média</label>
        <input type="number" name="media" id="imedia" min="0"
        max="10"  step="0.5" required value="5">
    </p>
    <p>
        <label for="imes">Período Letivo</label>
        <input type="month" name="mes" id="imes" value="2026-02">
    </p>
    <P>
        <label for="idia">dia da prova</label>
        <input type="date" name="dia" id="idia" value="2026-02-24">
    </P>
    <P>
        <label for="ihora">Horario da Prova</label>
        <input type="time" name="hora" id="ihora">
    </P>
    <p>
        <input type="submit" value="Enviar">

        <input type="reset" value="Limpar">
    </p></form>
</body>
</html>
