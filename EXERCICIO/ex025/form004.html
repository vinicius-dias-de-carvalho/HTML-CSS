<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Exemplo de formulario</h1>
    <form action="cadastros" method="get" autocomplete="on">
        <fieldset>
            <legend>Dados pessoais</legend>
            <p>
                <label for="inome">Nome</label>
                 <input type="text" name="name" id="iname" minlength="5" maxlength="20" required>
            </p>
            <p>
                <label for="iemail">E-mail</label>
                <input type="email" name="email"
                  id="iemail" autocomplete="email" required>
            </p>

                  <p>
                     <label for="itel">Telefone</label>
                     <input type="tel" name="tel" id="itel" autocomplete="tel" pattern="^(\d{2}\){4,5}-\d{4}$" placeholder="(xx)xxxx-xxxx" required>
                  </p>

        </fieldset>
               <!-- ESTUDAR MAIS SOBRE RegEx -->
              <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
               </p>
        
    </form>
</body>
</html>
